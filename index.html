<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clock.nyc</title>
    <meta name="description" content="read the time from nyc streetview" />
    <style>
      @font-face {
        font-family: 'LED Dot-Matrix';
        src: url('fonts/LED Dot-Matrix.ttf');
      }
      body {
        margin: 0;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #000;
        color: #fff;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      #time span {
        margin: auto auto;
      }
      #time {
        --bg-color: #816627;
        --text-color: rgb(231, 220, 18);
        --glow-color: #dedb82d0;

        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        position: fixed;
        top: 0%;
        left: 0%;
        transform: translate(0%, 0%);
        font-size: 3em;
        font-weight: bold;
        background-color: var(--bg-color, #78580e);
        color: var(--text-color, #f7ed25);
        padding: 10px 20px;
        margin: 10px;
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        text-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color),
          0 0 15px var(--glow-color), 0 0 20px var(--glow-color);
        border-radius: 10px;
        filter: blur(1px);
      }

      #time-colon {
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        animation: blink 1.2s step-start infinite;
        margin: 0 6px;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      #streetview {
        width: 100%;
        height: 100%;
      }
      #streetview-iframe {
        width: 100%;
        height: 100%;
      }
      #streetview-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent,
          transparent 50%,
          rgba(0, 0, 0, 0.8) 70%
        );
      }
    </style>
  </head>
  <body>
    <div id="time">
      <span id="time-hours"></span>
      <span id="time-colon">:</span>
      <span id="time-minutes"></span>
    </div>
    <div id="streetview">
      <div id="streetview-overlay"></div>
      <iframe id="streetview-iframe" src="" frameborder="0"></iframe>
    </div>

    <script src="utils.js"></script>
    <script>
      const GOOGLE_MAPS_API_KEY = 'AIzaSyC85j9aImruv_OSCjLtLxpTChstKYlxtLw'; // don't worry, this only has access to the free map embed api
      function parseOcrLine(lineStr) {
        let [
          id,
          panoramaId,
          text,
          ocrYaw,
          ocrPitch,
          ocrWidth,
          ocrHeight,
          lat,
          lng,
          heading,
          pitch,
          roll,
        ] = lineStr.split(',');
        return {
          id: parseInt(id),
          panoramaId,
          text,
          ocrYaw: parseFloat(ocrYaw),
          ocrPitch: parseFloat(ocrPitch),
          heading: parseFloat(heading),
          pitch: parseFloat(pitch),
          roll: parseFloat(roll),
          lat: parseFloat(lat),
          lng: parseFloat(lng),
          ocrWidth: parseFloat(ocrWidth),
          ocrHeight: parseFloat(ocrHeight),
        };
      }

      async function fetchGsvProps(hours, minutes) {
        const res = await fetch(`/digits/${hours}${minutes}.csv`);
        const data = await res.text();
        const lines = data.split('\n').slice(1); // skip the header
        return lines.map((line) => {
          const ocrProps = parseOcrLine(line);

          return getGoogleStreetviewProps(
            ocrProps.panoramaId,
            ocrProps.lat,
            ocrProps.lng,
            ocrProps.ocrYaw,
            ocrProps.ocrPitch,
            ocrProps.heading,
            ocrProps.pitch,
            ocrProps.roll,
            ocrProps.ocrWidth,
            ocrProps.ocrHeight
          );
        });
      }

      function pickRandomGsvProps(gsvProps) {
        const sortedLines = gsvProps.sort(
          (a, b) => b.ocrWidth * b.ocrHeight - a.ocrWidth * a.ocrHeight
        );

        // pick the one in the middle of the list
        const middleRange = {
          min: Math.max(0, Math.floor(sortedLines.length / 2) - 10),
          max: Math.min(
            sortedLines.length - 1,
            Math.floor(sortedLines.length / 2) + 10
          ),
        };

        const randomIdx =
          Math.floor(Math.random() * (middleRange.max - middleRange.min)) +
          middleRange.min;
        return sortedLines[randomIdx];
      }

      function getEmbedUrl(gsvProps) {
        return getGoogleStreetviewEmbedUrl(gsvProps, GOOGLE_MAPS_API_KEY);
      }
    </script>

    <script>
      let currentUrl = '';
      let currentGsvProps = [];

      async function updateTime() {
        const now = new Date().toLocaleString('en-US', {
          timeZone: 'America/New_York',
        });
        const date = new Date(now);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        document.getElementById('time-hours').innerHTML = hours;
        document.getElementById('time-minutes').innerHTML = minutes;

        currentGsvProps = await fetchGsvProps(hours, minutes);

        const randomGsvProps = pickRandomGsvProps(currentGsvProps);
        const embedUrl = getEmbedUrl(randomGsvProps);
        currentUrl = embedUrl;
        document.getElementById('streetview-iframe').src = embedUrl;
      }

      async function updateAndSchedule() {
        await updateTime();
        const now = new Date();
        const nextHour = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
          now.getHours() + 1,
          0,
          0,
          0
        );
        const timeUntilNextHour = nextHour - now;
        setTimeout(updateAndSchedule, timeUntilNextHour);
      }

      updateAndSchedule();
    </script>
  </body>
</html>
