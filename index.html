<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clock.nyc</title>
    <meta name="description" content="read the time from nyc streetview" />
    <style>
      @font-face {
        font-family: 'LED Dot-Matrix';
        src: url('fonts/LED Dot-Matrix.ttf');
      }
      body {
        --bg-color: rgb(51, 51, 51);
        --text-color: rgb(255, 129, 129);
        --glow-color: #f23434d0;
        margin: 0;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #000;
        color: #fff;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      #time span {
        margin: auto auto;
      }
      #time {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        position: fixed;
        top: 0%;
        left: 0%;
        transform: translate(0%, 0%);
        font-size: 3em;
        font-weight: bold;
        background-color: var(--bg-color, #78580e);
        color: var(--text-color, #f7ed25);
        padding: 10px 20px;
        margin: 10px;
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        text-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color),
          0 0 15px var(--glow-color), 0 0 20px var(--glow-color);
        border-radius: 10px;
        filter: blur(1px);
        transition: color 0.2s ease-in-out;
        user-select: none;
      }
      #time:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #time-colon {
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        animation: blink 1.2s step-start infinite;
        margin: 0 6px;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      #streetview {
        width: 100%;
        height: 100%;
      }
      #streetview-iframe {
        width: 100%;
        height: 100%;
      }
      #streetview-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent,
          transparent 50%,
          rgba(0, 0, 0, 0.8) 70%
        );
      }
      #shuffle-button {
        position: absolute;
        top: 0;
        right: 0;
        width: 24px;
        height: 24px;
        padding: 10px;
        margin: 10px;
        background-color: var(--bg-color);
        color: var(--text-color);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        border-radius: 10px;
        cursor: pointer;
        transition: color 0.2s ease-in-out;
        filter: blur(0.8px);
      }

      #shuffle-button:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #shuffle-button svg {
        filter: drop-shadow(0 0 5px var(--glow-color))
          drop-shadow(0 0 10px var(--glow-color))
          drop-shadow(0 0 15px var(--glow-color))
          drop-shadow(0 0 20px var(--glow-color));
      }
    </style>
  </head>
  <body>
    <div id="time">
      <span id="time-hours"></span>
      <span id="time-colon">:</span>
      <span id="time-minutes"></span>
    </div>
    <div id="shuffle-button">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-shuffle"
      >
        <path
          d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"
        />
        <path d="m18 2 4 4-4 4" />
        <path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2" />
        <path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8" />
        <path d="m18 14 4 4-4 4" />
      </svg>
    </div>
    <div id="streetview">
      <div id="streetview-overlay"></div>
      <iframe id="streetview-iframe" src="" frameborder="0"></iframe>
    </div>

    <script src="utils.js"></script>
    <script>
      const GOOGLE_MAPS_API_KEY = 'AIzaSyC85j9aImruv_OSCjLtLxpTChstKYlxtLw'; // don't worry, this only has access to the free map embed api
      function parseOcrLine(lineStr) {
        let [
          id,
          panoramaId,
          text,
          ocrYaw,
          ocrPitch,
          ocrWidth,
          ocrHeight,
          lat,
          lng,
          heading,
          pitch,
          roll,
        ] = lineStr.split(',');
        return {
          id: parseInt(id),
          panoramaId,
          text,
          ocrYaw: parseFloat(ocrYaw),
          ocrPitch: parseFloat(ocrPitch),
          heading: parseFloat(heading),
          pitch: parseFloat(pitch),
          roll: parseFloat(roll),
          lat: parseFloat(lat),
          lng: parseFloat(lng),
          ocrWidth: parseFloat(ocrWidth),
          ocrHeight: parseFloat(ocrHeight),
        };
      }

      async function fetchGsvProps(hours, minutes) {
        if (minutes < 10) minutes = `0${minutes}`;
        const res = await fetch(`/digits/${hours}${minutes}.csv`);
        const data = await res.text();
        const lines = data.split('\n').slice(1); // skip the header

        if (hours < 10) hours = `0${hours}`;
        const paddedRes = await fetch(`/digits/${hours}${minutes}.csv`);
        const paddedData = await paddedRes.text();
        const paddedLines = paddedData.split('\n').slice(1); // skip the header

        const allLines = [...lines, ...paddedLines];
        return allLines.map((line) => {
          const ocrProps = parseOcrLine(line);

          return getGoogleStreetviewProps(
            ocrProps.panoramaId,
            ocrProps.lat,
            ocrProps.lng,
            ocrProps.ocrYaw,
            ocrProps.ocrPitch,
            ocrProps.heading,
            ocrProps.pitch,
            ocrProps.roll,
            ocrProps.ocrWidth,
            ocrProps.ocrHeight
          );
        });
      }

      function pickRandomGsvProps(gsvProps, rangeFromMiddle = 10) {
        const sortedLines = gsvProps.sort(
          (a, b) => b.ocrWidth * b.ocrHeight - a.ocrWidth * a.ocrHeight
        );

        // pick the one in the middle of the list
        const middleRange = {
          min: Math.max(
            0,
            Math.floor(sortedLines.length / 2) - rangeFromMiddle
          ),
          max: Math.min(
            sortedLines.length - 1,
            Math.floor(sortedLines.length / 2) + rangeFromMiddle
          ),
        };

        const randomIdx =
          Math.floor(Math.random() * (middleRange.max - middleRange.min)) +
          middleRange.min;
        return sortedLines[randomIdx];
      }

      function getEmbedUrl(gsvProps) {
        return getGoogleStreetviewEmbedUrl(gsvProps, GOOGLE_MAPS_API_KEY);
      }
      function shuffle(rangeFromMiddle = 10) {
        const randomGsvProps = pickRandomGsvProps(
          currentGsvProps,
          rangeFromMiddle
        );
        const embedUrl = getEmbedUrl(randomGsvProps);
        currentUrl = embedUrl;
        document.getElementById('streetview-iframe').src = embedUrl;
      }
    </script>

    <script>
      let currentUrl = '';
      let currentGsvProps = [];
      let nextInterval = 0;

      async function updateTime() {
        const now = new Date().toLocaleString('en-US', {
          timeZone: 'America/New_York',
        });
        const date = new Date(now);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        document.getElementById('time-hours').innerHTML = hours;
        document.getElementById('time-minutes').innerHTML = minutes;

        currentGsvProps = await fetchGsvProps(hours, minutes);
        shuffle();
      }

      async function updateAndSchedule() {
        clearTimeout(nextInterval);
        await updateTime();
        const now = new Date();
        const nextHour = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
          now.getHours() + 1,
          0,
          0,
          0
        );
        const timeUntilNextHour = nextHour - now;
        nextInterval = setTimeout(updateAndSchedule, timeUntilNextHour);
      }

      updateAndSchedule();

      if (/Mobi|Android/i.test(navigator.userAgent)) {
        window.addEventListener('blur', () => {
          window.addEventListener('focus', updateAndSchedule, { once: true });
        });
      }

      document
        .getElementById('shuffle-button')
        .addEventListener('click', () => shuffle(1000));
    </script>
  </body>
</html>
