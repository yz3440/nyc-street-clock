<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clock.nyc</title>
    <meta name="description" content="read the time from nyc streetview" />
    <style>
      @font-face {
        font-family: 'LED Dot-Matrix';
        src: url('fonts/LED Dot-Matrix.ttf');
      }
      body {
        --bg-color: rgb(51, 51, 51);
        --text-color: rgb(255, 129, 129);
        --glow-color: #f23434d0;
        margin: 0;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #000;
        color: #fff;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      #time span {
        margin: auto auto;
      }
      #time {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        position: fixed;
        top: 0%;
        left: 0%;
        transform: translate(0%, 0%);
        font-size: 3em;
        font-weight: bold;
        background-color: var(--bg-color, #78580e);
        color: var(--text-color, #f7ed25);
        padding: 10px 20px;
        margin: 10px;
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        text-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color),
          0 0 15px var(--glow-color), 0 0 20px var(--glow-color);
        border-radius: 10px;
        filter: blur(1px);
        transition: color 0.2s ease-in-out;
        user-select: none;
      }
      #time:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #time-colon {
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        animation: blink 1.2s step-start infinite;
        margin: 0 6px;
      }

      #time-timezone {
        font-size: 0.5em;
        margin-left: 10px;
        margin-bottom: 9px !important;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      #streetview {
        width: 100%;
        height: 100%;
      }
      #streetview-iframe {
        width: 100%;
        height: 100%;
      }

      #streetview-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent,
          transparent 50%,
          rgba(0, 0, 0, 0.8) 70%
        );
      }
      #address-blocker {
        position: absolute;
        top: 0;
        left: 0;
        width: 20%;
        height: 20%;
        background-color: #000;
        z-index: 101;
      }
      #shuffle-button {
        position: absolute;
        top: 0;
        right: 0;
        width: 24px;
        height: 24px;
        padding: 10px;
        margin: 10px;
        background-color: var(--bg-color);
        color: var(--text-color);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        border-radius: 10px;
        cursor: pointer;
        transition: color 0.2s ease-in-out;
        filter: blur(0.8px);
      }

      #shuffle-button:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #shuffle-button svg {
        filter: drop-shadow(0 0 5px var(--glow-color))
          drop-shadow(0 0 10px var(--glow-color))
          drop-shadow(0 0 15px var(--glow-color))
          drop-shadow(0 0 20px var(--glow-color));
      }
    </style>
