<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clock.nyc</title>
    <meta name="description" content="read the time from nyc streetview" />
    <style>
      @font-face {
        font-family: 'LED Dot-Matrix';
        src: url('fonts/LED Dot-Matrix.ttf');
      }
      body {
        --bg-color: rgb(51, 51, 51);
        --text-color: rgb(255, 129, 129);
        --glow-color: #f23434d0;
        margin: 0;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #000;
        color: #fff;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }
      #time span {
        margin: auto auto;
      }
      #time {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
        position: fixed;
        top: 0%;
        left: 0%;
        transform: translate(0%, 0%);
        font-size: 3em;
        font-weight: bold;
        background-color: var(--bg-color, #78580e);
        color: var(--text-color, #f7ed25);
        padding: 10px 20px;
        margin: 10px;
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        text-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color),
          0 0 15px var(--glow-color), 0 0 20px var(--glow-color);
        border-radius: 10px;
        filter: blur(1px);
        transition: color 0.2s ease-in-out;
        user-select: none;
      }
      #time:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #time-colon {
        font-family: 'LED Dot-Matrix', 'Helvetica Neue', Helvetica, Arial,
          sans-serif;
        animation: blink 1.2s step-start infinite;
        margin: 0 6px;
      }

      #time-timezone {
        font-size: 0.5em;
        margin-left: 10px;
        margin-bottom: 9px !important;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      #streetview {
        width: 100%;
        height: 100%;
      }
      #streetview-iframe {
        width: 100%;
        height: 100%;
      }

      #streetview-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          transparent,
          transparent 50%,
          rgba(0, 0, 0, 0.8) 70%
        );
      }
      #shuffle-button {
        position: absolute;
        top: 0;
        right: 0;
        width: 24px;
        height: 24px;
        padding: 10px;
        margin: 10px;
        background-color: var(--bg-color);
        color: var(--text-color);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        border: 2px solid #fff;
        border-left-color: #333;
        border-top-color: #333;
        box-shadow: inset -2px -2px 0 #333, inset 2px 2px 0 #fff;
        z-index: 100;
        border-radius: 10px;
        cursor: pointer;
        transition: color 0.2s ease-in-out;
        filter: blur(0.8px);
      }

      #shuffle-button:hover {
        transition: color 0.2s ease-in-out;
        color: var(--glow-color);
      }

      #shuffle-button svg {
        filter: drop-shadow(0 0 5px var(--glow-color))
          drop-shadow(0 0 10px var(--glow-color))
          drop-shadow(0 0 15px var(--glow-color))
          drop-shadow(0 0 20px var(--glow-color));
      }
    </style>
  </head>
  <body>
    <div id="time">
      <span id="time-hours"></span>
      <span id="time-colon">:</span>
      <span id="time-minutes"></span>
      <span id="time-timezone">ET</span>
    </div>
    <div id="shuffle-button">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-shuffle"
      >
        <path
          d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"
        />
        <path d="m18 2 4 4-4 4" />
        <path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2" />
        <path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8" />
        <path d="m18 14 4 4-4 4" />
      </svg>
    </div>
    <div id="streetview">
      <div id="streetview-overlay"></div>
      <iframe id="streetview-iframe" src="" frameborder="0"></iframe>
    </div>

    <script src="utils.js"></script>
    <script>
      const GOOGLE_MAPS_API_KEY = 'AIzaSyC85j9aImruv_OSCjLtLxpTChstKYlxtLw';

      // All approved data, indexed by time text
      let allData = [];        // raw JSON array from approved.json
      let dataByTime = {};     // { "432": [...rows], "100": [...rows] }
      let cachedWindow = {};   // subset of dataByTime for nearby minutes
      let currentTimeKey = ''; // e.g. "432"
      let seenIds = {};        // { "432": Set([id1, id2, ...]) } — tracks shown images per time

      async function loadApprovedData() {
        const res = await fetch('approved.json');
        allData = await res.json();

        // Build lookup by time text
        dataByTime = {};
        for (const row of allData) {
          const key = String(row.text);
          if (!dataByTime[key]) dataByTime[key] = [];
          dataByTime[key].push(row);
        }
        console.log(`Loaded ${allData.length} approved rows across ${Object.keys(dataByTime).length} times`);
      }

      function to12Hour(h) {
        // Convert 24h hour to 12h (0->12, 13->1, etc.)
        h = h % 12;
        return h === 0 ? 12 : h;
      }

      function getNYCTime() {
        const now = new Date().toLocaleString('en-US', {
          timeZone: 'America/New_York',
        });
        const date = new Date(now);
        const h24 = date.getHours();
        return { hours: to12Hour(h24), minutes: date.getMinutes(), ampm: h24 >= 12 ? 'PM' : 'AM' };
      }

      function timeToKey(hours, minutes) {
        // Match the DB format: 12h, e.g. hour=4, minute=32 -> "432"
        // hour=10, minute=5 -> "1005"
        return String(hours * 100 + minutes);
      }

      function cacheNearbyMinutes(hours, minutes) {
        // Cache current time + next 10 minutes for quick access
        cachedWindow = {};
        for (let offset = 0; offset < 10; offset++) {
          let m = minutes + offset;
          let h = hours;
          if (m >= 60) {
            m -= 60;
            h += 1;
            if (h > 12) h = 1;
          }
          const key = timeToKey(h, m);
          if (dataByTime[key]) {
            cachedWindow[key] = dataByTime[key];
          }
        }
      }

      function rowToGsvProps(row) {
        return getGoogleStreetviewProps(
          row.panorama_id,
          row.lat,
          row.lng,
          row.ocr_yaw,
          row.ocr_pitch,
          row.heading,
          row.pitch,
          row.roll,
          row.ocr_width,
          row.ocr_height
        );
      }

      function showRandomRow(timeKey) {
        const rows = cachedWindow[timeKey] || dataByTime[timeKey];
        if (!rows || rows.length === 0) {
          console.log(`No approved rows for time ${timeKey}`);
          return;
        }

        if (!seenIds[timeKey]) seenIds[timeKey] = new Set();

        // Filter to unseen rows
        let unseen = rows.filter(r => !seenIds[timeKey].has(r.id));

        // If all have been shown, reset and allow repeats
        if (unseen.length === 0) {
          seenIds[timeKey].clear();
          unseen = rows;
        }

        const row = unseen[Math.floor(Math.random() * unseen.length)];
        seenIds[timeKey].add(row.id);

        const gsvProps = rowToGsvProps(row);
        const embedUrl = getGoogleStreetviewEmbedUrl(gsvProps, GOOGLE_MAPS_API_KEY);
        document.getElementById('streetview-iframe').src = embedUrl;
      }

      function updateDisplay(hours, minutes, ampm) {
        document.getElementById('time-hours').innerHTML = String(hours);
        document.getElementById('time-minutes').innerHTML = String(minutes).padStart(2, '0');
        document.getElementById('time-timezone').innerHTML = ampm;

        const timeKey = timeToKey(hours, minutes);
        currentTimeKey = timeKey;
        cacheNearbyMinutes(hours, minutes);
        showRandomRow(timeKey);
      }

      function shuffle() {
        showRandomRow(currentTimeKey);
      }

      let nextInterval = 0;

      async function updateAndSchedule() {
        clearTimeout(nextInterval);
        const { hours, minutes, ampm } = getNYCTime();
        updateDisplay(hours, minutes, ampm);

        // Schedule next update at the start of the next minute
        const now = new Date();
        const nextMinute = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
          now.getHours(),
          now.getMinutes() + 1,
          0,
          0
        );
        const timeUntilNextMinute = nextMinute - now;
        nextInterval = setTimeout(updateAndSchedule, timeUntilNextMinute);
      }

      // Init
      loadApprovedData().then(() => {
        updateAndSchedule();
      });

      if (/Mobi|Android/i.test(navigator.userAgent)) {
        window.addEventListener('blur', () => {
          window.addEventListener('focus', updateAndSchedule, { once: true });
        });
      }

      document
        .getElementById('shuffle-button')
        .addEventListener('click', () => shuffle());
    </script>
  </body>
</html>
